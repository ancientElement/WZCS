<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>局域网文字传输</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>📡</h1>

  <div id="status" class="status disconnected">正在连接...</div>

  <div class="key-area">
    <label>🔑 加密密钥：</label>
    <input type="password" id="encKey" placeholder="双方填写相同密钥，点确认生效" onkeydown="if(event.key==='Enter')confirmKey()">
    <button class="key-confirm-btn" onclick="confirmKey()">确认</button>
    <span id="encBadge" class="enc-badge off">未加密</span>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="在此输入要发送的文字..."></textarea>
    <button onclick="sendText()">发送文字</button>
  </div>

  <div class="messages">
    <h2>📨 收到的消息</h2>
    <div id="messageList">
      <div class="empty">暂无消息</div>
    </div>
    <button class="clear-btn" onclick="clearMessages()">清空消息</button>
  </div>

  <script src="/aes.js"></script>
  <script src="/app.js"></script>
</body>
</html>
